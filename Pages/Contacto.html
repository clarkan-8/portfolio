<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <link rel="shortcut icon" href="/Assets/ICON/Vega.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Akt:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Assets/CSS/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
</head>
<body>
    <div id="header"></div>
    <div class="container-contacto">
        <div class="background-contacto">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>

    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" placeholder="+507 6000-0000">

    <label for="description">Description</label>
    <textarea id="description" name="description" placeholder="Write your message..." rows="5"></textarea>

    <a id="sendboton">Send Message</a>
    </div>
</div>
    <div id="footer"></div>
    <script src="/Assets/JS/script.js"></script>
</body>
</html
